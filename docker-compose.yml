services:
  claude-detector:
    build: .
    ports:
      - "4321:4321"
    volumes:
      - claude-detector-data:/data
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4321/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  claude-detector-data:
